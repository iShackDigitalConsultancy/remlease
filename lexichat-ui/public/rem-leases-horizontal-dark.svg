<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" width="520" height="80">
  <!-- REM-Leases — Horizontal Lockup — Dark Background -->
  <!-- Icon: Teal document + Gold wing -->
  <g transform="translate(0, 8)">
    <!-- Document outline -->
    <rect x="0" y="6" width="42" height="54" rx="5" fill="none" stroke="#22d3ee" stroke-width="1.4" opacity="0.5"/>
    <!-- Doc lines -->
    <line x1="9" y1="20" x2="33" y2="20" stroke="#22d3ee" stroke-width="1.4" stroke-linecap="round" opacity="0.3"/>
    <line x1="9" y1="29" x2="28" y2="29" stroke="#22d3ee" stroke-width="1.4" stroke-linecap="round" opacity="0.2"/>
    <line x1="9" y1="38" x2="23" y2="38" stroke="#22d3ee" stroke-width="1.4" stroke-linecap="round" opacity="0.15"/>
    <!-- Gold wing -->
    <path fill="#fbbf24" d="M34 9 Q48 2 65 0 L60 7 Q51 12 42 18 Z" opacity="0.9"/>
    <path fill="#f59e0b" d="M39 14 Q50 7 65 0 L60 7 Q51 12 42 18 Z" opacity="0.4"/>
    <!-- Speed line -->
    <line x1="-7" y1="16" x2="9" y2="12" stroke="#fbbf24" stroke-width="1.8" stroke-linecap="round" opacity="0.35"/>
  </g>
  <!-- Wordmark -->
  <text x="80" y="46" font-family="'Helvetica Neue', Arial, sans-serif" font-size="40px" font-weight="500" letter-spacing="-1px">
    <tspan fill="#f1f5f9">REM</tspan><tspan fill="#22d3ee">-Leases</tspan>
  </text>
  <!-- .ai -->
  <text x="390" y="46" font-family="'Helvetica Neue', Arial, sans-serif">
    <tspan fill="#fbbf24" font-size="44px" font-weight="500">.</tspan><tspan fill="#64748b" font-size="30px" font-weight="400">ai</tspan>
  </text>
</svg>
